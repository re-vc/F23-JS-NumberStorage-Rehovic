<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;500;700&display=swap");

        * {
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .wrap {
            display: block;
            width: 50%;
        }

        .input {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .width {
            width: 100%;
        }

        #displayArray {
            box-shadow: 5px 0 10px rgba(0, 0, 0, 0.2), -5px 0 10px rgba(0, 0, 0, 0.2);
            min-height: 3rem;
            max-height: 5rem;
            overflow: auto;
        }

        @media screen and (max-width: 768px) {
            .wrap {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="wrap">
            <div class="input">
                <input class="width" type="number" id="myNumber" name="myNumber">
                <button class="width" onclick="addToArray()">add</button>
                <button class="width" onclick="subFromArray()">sub</button>
            </div>
            <div>
                <h1 style="margin: 0;">stored numbers</h1>
                <div id="displayArray"></div>
            </div>
        </div>
    </main>

    <script type="text/JavaScript" src="javascript.js"></script>
</body>

</html>
